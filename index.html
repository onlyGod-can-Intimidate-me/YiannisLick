 ║  4. On playback, the RAF loop ticks song time, yncs lyrics + expected note   ║
 ║  5. Mic input is autocorrelated each audio frame → smoothed note name        ║
 ║  6. Sung note vs. expected note → colour feedback on the big karaoke word    ║

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Guitar Timing Trainer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden; /* no scrolling ever */
        }

        /* ── LAYOUT — full viewport, stacked vertically ── */
        #app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* ── HEADER BAR ── */
        #header-bar {

            padding: 6px 16px;

        /* ── CANVAS WRAP — takes all remaining space ── */

        }

        }
        #feedback-text {

        }

        /* ── YOUTUBE OVERLAY — floats over canvas ── */
        #yt-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            aspect-ratio: 16/9;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        #yt-overlay iframe {

        }

        /* ── BOTTOM BAR ── */
        #bottom-bar {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 56px 1fr 1fr 1fr 56px;
            align-items: stretch;

        }

        /* Arrow buttons */
        .nav-btn {

        .nav-btn:disabled { color: #333; }

        /* Main buttons */
        .action-btn {

        .action-btn:last-of-type { border-right: none; }
        .action-btn:active { filter: brightness(1.2); }

        #play-btn  { background: #4CAF50; color: #000; }
        #speed-btn { background: #00BCD4; color: #000; }
        #vid-btn   { background: #2196F3; color: #fff; }

        /* ── SONG PICKER OVERLAY ── */
        #picker-overlay {

        /* ── STATUS ── */

        /* ── CONTROLS ── */
        #controls {

        }

        .button-group {

        .button-group input[type="number"],

        /* ── FULLSCREEN MODE ── */
        #fs-btn {

            background: #333; color: #fff; border: none;
            border-radius: 6px; padding: 8px 14px; font-size: 18px;
            cursor: pointer; opacity: 0.7;
        }
        #fs-btn:hover { opacity: 1; }

        body.fs-mode > *:not(#canvas-wrap):not(#fs-btn) { display: none !important; }
        body.fs-mode #canvas-wrap {
            position: fixed; inset: 0; z-index: 998;
            margin: 0; border-radius: 0; border: none;
        }
        body.fs-mode #guitar-canvas { height: 100vh; }

        /* ── PORTRAIT WARNING ── */
        #rotate-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Courier New', monospace;
        }
        #rotate-msg .icon { font-size: 60px; animation: rotatespin 2s infinite; }
        #rotate-msg p { color: #4CAF50; font-size: 16px; letter-spacing: 2px; margin-top: 16px; }
        @keyframes rotatespin {
            0%,100% { transform: rotate(0deg); }
            50%      { transform: rotate(90deg); }
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotate-msg { display: flex; }
        }
</style>
</head>
<body>

<!-- Portrait warning — shows on mobile in portrait mode -->
<div id="rotate-msg">
    <div class="icon">📱</div>
    <p>TURN YOUR PHONE<br>SIDEWAYS 🎸</p>
</div>

<div id="app">

    <!-- ── HEADER BAR ── -->
    <div id="header-bar">
        <span id="header-song">🎸 GUITAR TRAINER</span>
        &nbsp;·&nbsp;

    </div>

    <!-- ── CANVAS + OVERLAYS ── -->

<script>
    // ─────────────────────────────────────────────
    //  NOTE / STRING LOOKUP TABLES
    // ─────────────────────────────────────────────
    const NOTE_FREQS = {
        'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,'A#2':116.54,'B2':123.47,
        'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,
        'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
        'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,
        'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
        'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25
    };

    const STRING_NOTES = {
        1: ['E4','F4','F#4','G4','G#4','A4','A#4','B4','C5','C#5','D5','D#5','E5'],
        2: ['B3','C4','C#4','D4','D#4','E4','F4','F#4','G4','G#4','A4','A#4','B4'],
        3: ['G3','G#3','A3','A#3','B3','C4','C#4','D4','D#4','E4','F4','F#4','G4'],
        4: ['D3','D#3','E3','F3','F#3','G3','G#3','A3','A#3','B3','C4','C#4','D4'],
        5: ['A2','A#2','B2','C3','C#3','D3','D#3','E3','F3','F#3','G3','G#3','A3'],
        6: ['E2','F2','F#2','G2','G#2','A2','A#2','B2','C3','C#3','D3','D#3','E3']
    };

    const STRING_COLORS = ['#4CAF50','#9C27B0','#FF9800','#2196F3','#00BCD4','#f44336'];
    const STRING_LABELS = ['e','B','G','D','A','E'];

    // ─────────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────────
    let columns      = [];
    let bpm          = 100;
    let speedMult    = 1.0;
    let isPlaying    = false;
    let isLooping    = false;
    let activeTiming = []; // recorded timing array from admin
    let playbackEnabled = true;
    let currentCol   = -1;

    // Canvas
    let canvas, canvasCtx;
    let pills        = [];
    let startTime    = null;
    let rafId        = null;
    let lastTriggeredCol = -1;

    // Parabolic bomb ball — one per upcoming note
    let activeBombs = []; // { targetLane, launchTime, landTime, color }

    // Web Audio
    let audioCtx     = null;
    let analyser     = null;
    let scriptProc   = null;

    // Mic
    let micStream    = null;

    // ─────────────────────────────────────────────
    //  DOM REFS
    // ─────────────────────────────────────────────
    const playBtn         = document.getElementById('play-btn');
    const speedBtn        = document.getElementById('speed-btn');
    const feedbackText    = document.getElementById('feedback-text');

    // tabEditor shim — stores tab text and triggers parse
    const tabEditor = {
        _val: '',
        get value() { return this._val; },
        set value(v) { this._val = v; }
    };

    // Stubs for removed elements — keeps old code from crashing
    const stopBtn         = { disabled: false };
    const loopBtn         = { textContent: '', style: {} };
    const slowBtn         = null;
    const mediumBtn       = null;
    const normalBtn       = null;
    const soundBtn        = null;
    const micBtn          = null;
    const parseBtn        = null;
    const clearBtn        = null;
    const saveBtn         = null;
    const loadBtn         = null;
    const riffNameInput   = { value: '' };
    const loadList        = { innerHTML: '' };
    const bpmInput        = { value: 100 };
    const micStatus       = { textContent: '', classList: { add:()=>{}, remove:()=>{} } };
    const positionSpan    = { textContent: '' };
    const currentNoteSpan = { textContent: '' };
    const detectedNoteSpan= { textContent: '' };

    // ─────────────────────────────────────────────
    //  PARSE TAB → COLUMNS
    //
    //  A "column" = one character-position across all 6 strings.
    //  We skip the "e|", "B|" prefix (first 2 chars of each line).
    //  Each column stores which notes (if any) are at that position.
    // ─────────────────────────────────────────────
    function parseAndRender(tabText) {
        const stringOrder = ['e','B','G','D','A','E'];
        const stringMap = { 'e':1,'B':2,'G':3,'D':4,'A':5,'E':6 };

        // Split into all lines
        const rawLines = tabText.split('\n');

        // Collect only tab lines (contain dashes), ignore everything else
        // Group them into slabs of 6
        const tabLines = rawLines.filter(l => l.includes('-'));

        // Build slabs — every 6 consecutive tab lines = one slab
        const slabs = [];
        for (let i = 0; i + 5 < tabLines.length; i += 6) {
            slabs.push(tabLines.slice(i, i + 6));
        }

        if (slabs.length === 0) return;

        // Merge all slabs: concatenate each string row across all slabs
        // Strip leading string labels if present e.g. "e|" or "B|"
        const mergedStrings = ['','','','','',''];
        slabs.forEach(slab => {
            slab.forEach((line, si) => {
                // Strip optional string label prefix like "e|" "B|" or just leading "|"
                const stripped = line.replace(/^[eEBGDA]\|/, '').replace(/^\|/, '').replace(/\|$/, '');
                mergedStrings[si] += stripped + '|';
            });
        });

        // Rebuild as labeled tab text for the existing parser logic below
        const labeledText = mergedStrings.map((content, i) =>
            stringOrder[i] + '|' + content
        ).join('\n');

        // Now parse the merged labeled tab
        const lines = labeledText.split('\n').filter(l => l.trim());

        // Build per-string char arrays (excluding the "X|" prefix)
        const stringLines = {};
        let maxLen = 0;

        lines.forEach(line => {
            const m = line.match(/^([eEBGDA])\|(.*)/);
            if (!m) return;
            const sName = m[1];
            const sNum  = stringMap[sName] ?? stringMap[sName.toLowerCase()];
            if (!sNum) return;
            const chars = m[2].replace(/\|$/, '').split('');
            stringLines[sNum] = chars;
            if (chars.length > maxLen) maxLen = chars.length;
        });

        if (Object.keys(stringLines).length === 0) return;

        // Walk column by column, skip 2-digit fret second char
        columns = [];
        const skipCol = new Set(); // columns that are the 2nd digit of a 2-digit fret

        // First pass: mark 2nd digits so we can merge them
        for (let c = 0; c < maxLen; c++) {
            for (let s = 1; s <= 6; s++) {
                const chars = stringLines[s];
                if (!chars) continue;
                const ch = chars[c];
                if (ch >= '0' && ch <= '9') {
                    const prev = c > 0 ? chars[c - 1] : null;
                    if (prev >= '0' && prev <= '9') {
                        skipCol.add(c); // this col is 2nd digit on at least one string
                    }
                }
            }
        }

        // Second pass: build columns
        for (let c = 0; c < maxLen; c++) {
            if (skipCol.has(c)) continue;

            const colNotes = [];
            for (let s = 1; s <= 6; s++) {
                const chars = stringLines[s];
                if (!chars) continue;
                let ch = chars[c] ?? '-';

                // Check for 2-digit fret
                if (ch >= '0' && ch <= '9' && skipCol.has(c + 1)) {
                    const next = chars[c + 1];
                    if (next >= '0' && next <= '9') {
                        ch = ch + next;
                    }
                }

                if (ch !== '-' && ch !== '|' && ch !== ' ') {
                    const fret = parseInt(ch);
                    if (!isNaN(fret)) {
                        const noteName = STRING_NOTES[s]?.[fret];
                        if (noteName) {
                            colNotes.push({ string: s, fret, note: noteName, freq: NOTE_FREQS[noteName] });
                        }
                    }
                }
            }

            columns.push({ index: columns.length, notes: colNotes });
        }

        renderCanvas();
    }

    function updateDisplay() {
        parseAndRender(tabEditor.value);
    }

    // ─────────────────────────────────────────────
    //  CANVAS INIT
    // ─────────────────────────────────────────────
    function initCanvas() {
        canvas = document.getElementById('guitar-canvas');
        canvasCtx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); if (!isPlaying) renderCanvas(); });
    }

    function resizeCanvas() {
        canvas.width  = canvas.offsetWidth  || 600;
        canvas.height = canvas.offsetHeight || 220;
    }

    // ─────────────────────────────────────────────
    //  PILL BUILDER
    //  Each note column gets a pill per string note.
    //  Pill width = time until next note column.
    // ─────────────────────────────────────────────
    // Active timing array — set when a section with recorded timing is loaded
    function buildPills() {
        pills = [];
        const stepMs = stepIntervalMs();

        // Get only columns that have notes (in order)
        const noteCols = columns.map((col, ci) => ({ col, ci }))
                                .filter(({ col }) => col.notes.length > 0);

        noteCols.forEach(({ col, ci }, noteIdx) => {
            // Use recorded timing if available, else fall back to BPM grid
            const triggerMs = (activeTiming.length > noteIdx)
                ? activeTiming[noteIdx]
                : ci * stepMs;

            // Duration = gap to next note
            const nextTrigger = (activeTiming.length > noteIdx + 1)
                ? activeTiming[noteIdx + 1]
                : (noteCols[noteIdx + 1]
                    ? (activeTiming.length > noteIdx + 1
                        ? activeTiming[noteIdx + 1]
                        : noteCols[noteIdx + 1].ci * stepMs)
                    : triggerMs + stepMs);
            const durMs = Math.max(nextTrigger - triggerMs, 150);

            col.notes.forEach(n => {
                pills.push({
                    colIndex:  ci,
                    triggerMs,
                    string:    n.string,
                    fret:      n.fret,
                    note:      n.note,
                    freq:      n.freq,
                    durMs,
                    state:     'upcoming',
                    triggered: false,
                });
            });
        });
    }

    // ─────────────────────────────────────────────
    //  DRAW
    // ─────────────────────────────────────────────
    function pill(ctx, x, y, w, h, r) {
        r = Math.min(r, h/2, w/2);
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);
        ctx.arcTo(x+w, y, x+w, y+r, r);
        ctx.lineTo(x+w, y+h-r);
        ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
        ctx.lineTo(x+r, y+h);
        ctx.arcTo(x, y+h, x, y+h-r, r);
        ctx.lineTo(x, y+r);
        ctx.arcTo(x, y, x+r, y, r);
        ctx.closePath();
    }

    function renderCanvas(elapsed) {
        if (!canvas) return;
        elapsed = elapsed ?? 0;
        const W = canvas.width, H = canvas.height;
        const laneH  = H / 6;
        const hitX   = W * 0.22;
        // pixels per ms: right portion covers 3.5 seconds of upcoming
        const ppm    = (W - hitX) / 3500;

        canvasCtx.clearRect(0, 0, W, H);

        // ── Lanes ──
        for (let s = 0; s < 6; s++) {
            const y = s * laneH;
            canvasCtx.fillStyle = s % 2 === 0 ? '#0d0d0d' : '#111';
            canvasCtx.fillRect(0, y, W, laneH);

            // String line
            canvasCtx.strokeStyle = '#222';
            canvasCtx.lineWidth = 1;
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, y + laneH/2);
            canvasCtx.lineTo(W, y + laneH/2);
            canvasCtx.stroke();

            // Lane label
            canvasCtx.fillStyle = '#333';
            canvasCtx.font = `bold 11px Courier New`;
            canvasCtx.textAlign = 'left';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(STRING_LABELS[s], 6, y + laneH/2);
        }

        // Lane dividers
        canvasCtx.strokeStyle = '#1a1a1a';
        canvasCtx.lineWidth = 1;
        for (let s = 1; s < 6; s++) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, s * laneH);
            canvasCtx.lineTo(W, s * laneH);
            canvasCtx.stroke();
        }

        // ── Pills ──
        pills.forEach(p => {
            const timeUntil = p.triggerMs - elapsed;
            const x  = hitX + timeUntil * ppm;
            const pw = Math.max(p.durMs * ppm - 4, 28);
            const lY = (p.string - 1) * laneH;
            const ph = laneH * 0.78;
            const py = lY + (laneH - ph) / 2;

            if (x > W + pw || x + pw < -20) return; // off screen

            let color = STRING_COLORS[p.string - 1];
            if (p.state === 'hit')    color = '#ffffff';
            if (p.state === 'missed') color = '#2a2a2a';

            // Glow as pill approaches hit line
            if (p.state === 'upcoming' && timeUntil >= 0 && timeUntil < 300) {
                canvasCtx.shadowColor = color;
                canvasCtx.shadowBlur  = 12;
            }

            canvasCtx.fillStyle = color;
            pill(canvasCtx, x, py, pw, ph, ph/2);
            canvasCtx.fill();
            canvasCtx.shadowBlur = 0;

            // Fret number
            const fontSize = Math.min(ph * 0.72, 24);
            canvasCtx.font = `bold ${fontSize}px Arial`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillStyle = p.state === 'missed' ? '#555' : '#000';
            canvasCtx.fillText(p.fret, x + pw/2, py + ph/2);
        });

        // ── Hit line ──
        canvasCtx.strokeStyle = 'rgba(255,255,255,0.5)';
        canvasCtx.lineWidth = 2;
        canvasCtx.setLineDash([5,5]);
        canvasCtx.beginPath();
        canvasCtx.moveTo(hitX, 0);
        canvasCtx.lineTo(hitX, H);
        canvasCtx.stroke();
        canvasCtx.setLineDash([]);

        // Hit line glow dot per lane
        for (let s = 0; s < 6; s++) {
            canvasCtx.fillStyle = 'rgba(255,255,255,0.12)';
            canvasCtx.beginPath();
            canvasCtx.arc(hitX, s * laneH + laneH/2, 4, 0, Math.PI*2);
            canvasCtx.fill();
        }

        // ── Parabolic Bombs ──
        const now = performance.now();
        activeBombs = activeBombs.filter(b => now < b.landTime + 300);

        activeBombs.forEach(bomb => {
            const total   = bomb.landTime - bomb.launchTime;
            const elapsed2 = now - bomb.launchTime;
            const t       = Math.max(0, Math.min(elapsed2 / total, 1));

            // Parabolic x: launches from right edge, lands on hitX
            const bx = hitX + (W - hitX) * (1 - t);

            // Parabolic y: arc up then down to lane centre
            const laneY = bomb.targetLane * laneH + laneH / 2;
            const peakY = laneY - (H * 0.65); // peak height above lane
            // y = at² + bt + c  passing through (0, laneY), peak at t=0.5, (1, laneY)
            const by = laneY + (peakY - laneY) * 4 * t * (1 - t);

            // Trail
            if (!bomb.trail) bomb.trail = [];
            if (t < 1) bomb.trail.push({ x: bx, y: by });
            if (bomb.trail.length > 22) bomb.trail.shift();

            // Draw trail dots
            bomb.trail.forEach((pt, i) => {
                const a = (i / bomb.trail.length) * 0.5;
                const r = 3 * (i / bomb.trail.length);
                canvasCtx.beginPath();
                canvasCtx.arc(pt.x, pt.y, Math.max(r, 1.5), 0, Math.PI*2);
                canvasCtx.fillStyle = `rgba(255,255,255,${a})`;
                canvasCtx.fill();
            });

            if (t < 1) {
                // Flying ball — white with glow
                const grad = canvasCtx.createRadialGradient(bx-3, by-3, 1, bx, by, 11);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(1, 'rgba(180,220,255,0.7)');
                canvasCtx.beginPath();
                canvasCtx.arc(bx, by, 11, 0, Math.PI*2);
                canvasCtx.fillStyle = grad;
                canvasCtx.shadowColor = '#adf';
                canvasCtx.shadowBlur  = 16;
                canvasCtx.fill();
                canvasCtx.shadowBlur  = 0;
            } else {
                // Landing squish burst on hit line
                const age   = now - bomb.landTime;
                const burst = Math.min(age / 120, 1);
                const alpha = 1 - burst;
                canvasCtx.beginPath();
                canvasCtx.ellipse(hitX, laneY,
                    14 + burst * 18,
                    10 - burst * 8,
                    0, 0, Math.PI*2);
                canvasCtx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
                canvasCtx.fill();
                // Ring
                canvasCtx.beginPath();
                canvasCtx.arc(hitX, laneY, 11 + burst * 16, 0, Math.PI*2);
                canvasCtx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
                canvasCtx.lineWidth = 2;
                canvasCtx.stroke();
            }
        });
    }

    // ─────────────────────────────────────────────
    //  RAF LOOP
    // ─────────────────────────────────────────────
    function rafLoop() {
        if (!isPlaying) return;
        const elapsed = performance.now() - startTime;

        // Trigger columns — use timing array if available, else BPM grid
        if (activeTiming.length) {
            // Timing-based: trigger each pill when elapsed >= its triggerMs
            pills.forEach(p => {
                if (!p.triggered && elapsed >= p.triggerMs) {
                    triggerColumn(p.colIndex);
                    p.triggered = true;
                }
            });
            // End check — last pill's triggerMs + durMs
            const last = pills[pills.length - 1];
            if (last && elapsed > last.triggerMs + last.durMs + 500) {
                if (isLooping) {
                    startTime = performance.now();
                    pills.forEach(p => { p.triggered = false; p.state = 'upcoming'; });
                    scheduleBombs();
                    rafId = requestAnimationFrame(rafLoop);
                    return;
                } else { stop(); return; }
            }
        } else {
            // BPM grid — original logic
            const stepMs  = stepIntervalMs();
            const newCol  = Math.floor(elapsed / stepMs);
            for (let c = lastTriggeredCol + 1; c <= newCol && c < columns.length; c++) {
                triggerColumn(c);
            }
            if (newCol > lastTriggeredCol) lastTriggeredCol = Math.min(newCol, columns.length - 1);
            if (elapsed / stepMs >= columns.length) {
                if (isLooping) {
                    startTime = performance.now();
                    lastTriggeredCol = -1;
                    currentExpectedNotes = [];
                    buildPills();
                    scheduleBombs();
                    renderCanvas(0);
                    rafId = requestAnimationFrame(rafLoop);
                    return;
                } else { stop(); return; }
            }
        }

        // Mark pills as triggered/missed
        pills.forEach(p => {
            const timeUntil = p.triggerMs - elapsed;
            if (!p.triggered && timeUntil <= 0) {
                p.triggered = true;
                // Pill missed if it gets past hit line with no hit
                if (p.state === 'upcoming') {
                    setTimeout(() => {
                        if (p.state === 'upcoming') p.state = 'missed';
                    }, p.durMs);
                }
            }
        });

        renderCanvas(elapsed);
        rafId = requestAnimationFrame(rafLoop);
    }

    function triggerColumn(ci) {
        currentCol = ci;
        const col = columns[ci];
        const noteDur = stepIntervalMs() / 1000 * 1.5;

        if (col.notes.length > 0) {
            col.notes.forEach(n => playNoteNow(n.freq, noteDur));
            const names = col.notes.map(n => n.note).join(', ');
            currentNoteSpan.textContent = names;
            if (micStream) setExpectedNotes(col.notes, currentExpectedNotes.length > 0);
        } else {
            const holdover = currentExpectedNotes.map(n => n.note).join(', ');
            currentNoteSpan.textContent = holdover ? `(${holdover})` : '-';
        }
    }

    // Pre-schedule all bombs at play() time so they're already arcing through the air
    function scheduleBombs() {
        activeBombs = [];
        const stepMs   = stepIntervalMs();
        const flightMs = stepMs * 10; // bomb takes 10 columns to travel — nice long arc

        pills.forEach(p => {
            const landTime   = startTime + p.triggerMs;
            const launchTime = landTime - flightMs;
            activeBombs.push({
                targetLane: p.string - 1, // 0-5
                launchTime,
                landTime,
                trail: [],
            });
        });
    }

    // ─────────────────────────────────────────────
    //  PLAY / STOP
    // ─────────────────────────────────────────────
    function play() {
        if (columns.length === 0) { alert('Tap the header to pick a song first!'); return; }
        ensureAudioCtx();
        isPlaying = true;
        currentCol = -1;
        lastTriggeredCol = -1;
        currentExpectedNotes = [];
        buildPills();
        startTime = performance.now();
        scheduleBombs();
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(rafLoop);
    }

    function stop() {
        isPlaying = false;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        currentExpectedNotes = [];
        activeBombs = [];
        document.body.style.backgroundColor = '#000';
        buildPills();
        renderCanvas(0);
    }

    // ─────────────────────────────────────────────
    //  AUDIO HELPERS
    // ─────────────────────────────────────────────
    function stepIntervalMs() { return (60 / bpm) * 500 / speedMult; }

    function ensureAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playNoteNow(freq, duration) {
        if (!playbackEnabled || !freq) return;
        const ctx = ensureAudioCtx(), now = ctx.currentTime;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.8, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.4, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.2, now + duration);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.08);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now); osc.stop(now + duration + 0.1);
    }

    // ─────────────────────────────────────────────
    //  MICROPHONE & PITCH DETECTION
    // ─────────────────────────────────────────────
    async function initMicrophone() {
        try {
            micStatus.textContent = '🎤 Requesting...';
            ensureAudioCtx();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;

            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mic = audioCtx.createMediaStreamSource(micStream);
            scriptProc = audioCtx.createScriptProcessor(2048, 1, 1);

            // Software boost for acoustic guitars
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(document.getElementById('mic-gain').value) || 3.0;
            window._micGainNode = gainNode;

            mic.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(scriptProc);
            scriptProc.connect(audioCtx.destination);
            scriptProc.onaudioprocess = processAudio;

            micStatus.textContent = '🎤 Connected ✔';
            micStatus.classList.add('connected');
            micBtn.disabled = true;
        } catch (err) {
            micStatus.textContent = '🎤 ERROR: ' + err.message;
        }
    }

    function autoCorrelate(buffer, sampleRate) {
        const SIZE = buffer.length;
        const MAX_SAMPLES = Math.floor(SIZE / 2);
        let best_offset = -1, best_correlation = 0;
        let rms = 0;
        for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
        rms = Math.sqrt(rms / SIZE);
        if (rms < 0.01) return -1;

        let lastCorrelation = 1;
        for (let offset = 1; offset < MAX_SAMPLES; offset++) {
            let correlation = 0;
            for (let i = 0; i < MAX_SAMPLES; i++) {
                correlation += Math.abs(buffer[i] - buffer[i + offset]);
            }
            correlation = 1 - correlation / MAX_SAMPLES;
            if (correlation > 0.8 && correlation > lastCorrelation && correlation > best_correlation) {
                best_correlation = correlation;
                best_offset = offset;
            }
            lastCorrelation = correlation;
        }
        return best_correlation > 0.01 ? sampleRate / best_offset : -1;
    }

    function getClosestNote(freq) {
        if (freq < 0) return null;
        let closest = null, minDiff = Infinity;
        for (const [note, noteFreq] of Object.entries(NOTE_FREQS)) {
            const diff = Math.abs(freq - noteFreq);
            if (diff < minDiff) { minDiff = diff; closest = note; }
        }
        return minDiff < NOTE_FREQS[closest] * 0.06 ? closest : null;
    }

    let currentExpectedNotes = [];
    let nextExpectedNotes = [];   // pre-loaded so lookahead can prime it
    let graceUntil = 0;
    let wrongFrames = 0;
    const WRONG_THRESHOLD = 4;
    const LOOKAHEAD_MS = 200;     // start accepting next note this many ms before column hits

    function setExpectedNotes(notes, useGrace = false) {
        currentExpectedNotes = notes;
        graceUntil = useGrace ? performance.now() + 100 : 0;
        wrongFrames = 0;
    }

    function processAudio() {
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);

        let rms = 0;
        for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
        rms = Math.sqrt(rms / buffer.length);

        if (rms > 0.01) {
            const freq = autoCorrelate(buffer, audioCtx.sampleRate);
            const detected = getClosestNote(freq);
            detectedNoteSpan.textContent = detected ?? 'sound';

            // In grace window after step — stay black
            if (performance.now() < graceUntil) {
                wrongFrames = 0;
                document.body.style.backgroundColor = '#000';
                return;
            }

            // Only compare if there's an expected note — dash columns = never red
            if (detected && currentExpectedNotes.length > 0) {
                const correct = currentExpectedNotes.some(n => n.note === detected);
                if (correct) {
                    wrongFrames = 0;
                    document.body.style.backgroundColor = '#000';
                    // Mark matching pills as hit
                    const elapsed = startTime ? performance.now() - startTime : 0;
                    pills.forEach(p => {
                        if (p.state === 'upcoming' && p.triggered && p.note === detected) {
                            p.state = 'hit';
                            setTimeout(() => { if (p.state === 'hit') p.state = 'missed'; }, p.durMs * 0.8);
                        }
                    });
                } else {
                    wrongFrames++;
                    if (wrongFrames >= WRONG_THRESHOLD) document.body.style.backgroundColor = '#CC0000';
                }
            } else {
                wrongFrames = 0;
                document.body.style.backgroundColor = '#000';
            }
        } else {
            wrongFrames = 0;
            detectedNoteSpan.textContent = '-';
            document.body.style.backgroundColor = '#000';
        }
    }

    // ─────────────────────────────────────────────
    //  SPEED BUTTONS — restart if playing
    // ─────────────────────────────────────────────
    function setSpeed(mult, activeBtn) {
        speedMult = mult;
        [slowBtn, mediumBtn, normalBtn].forEach(b => b.style.opacity = '0.6');
        activeBtn.style.opacity = '1';

        if (isPlaying) {
            // Restart interval at new speed without resetting column
            clearInterval(stepTimerId);
            stepTimerId = setInterval(stepForward, stepIntervalMs());
        }
    }

    async function saveRiff() {
        const name = riffNameInput.value.trim();
        if (!name) { alert('Please enter a riff name!'); return; }
        try {
            const res = await fetch('/save-tab', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, tab: tabEditor.value, bpm })
            });
            const result = await res.json();
            alert(result.ok ? `✔ Saved: ${name}` : 'Failed to save');
        } catch (e) { alert('Failed to save: ' + e.message); }
    }

    async function loadRiffs() {
        try {
            const res  = await fetch('/load-tabs');
            const data = await res.json();
            loadList.innerHTML = '<h3>📂 Saved Riffs:</h3>';
            if (!data.riffs?.length) {
                loadList.innerHTML += '<p style="color:#888">No saved riffs yet!</p>';
            } else {
                data.riffs.forEach(riff => {
                    const div = document.createElement('div');
                    div.className = 'saved-riff';
                    div.textContent = `🎸 ${riff.name} (${riff.bpm} BPM)`;
                    div.onclick = () => {
                        tabEditor.value = riff.tab;
                        bpmInput.value  = riff.bpm;
                        bpm = riff.bpm;
                        updateDisplay();
                        loadList.style.display = 'none';
                    };
                    loadList.appendChild(div);
                });
            }
            loadList.style.display = 'block';
        } catch (e) { alert('Failed to load: ' + e.message); }
    }

    function loadSectionByIdx(idx) {
        if (!currentSections.length) return;
        stop();
        currentSectionIdx = idx;
        const s = currentSections[idx];
        tabEditor.value = s.tab || '';
        bpm = s.bpm || 100;

        // Use recorded timing if available
        activeTiming = (s.timing && s.timing.length) ? s.timing : [];

        parseAndRender(tabEditor.value);
        buildPills();
        renderCanvas(0);

        // Header
        const songName = document.getElementById('header-song').dataset.name || 'GUITAR TRAINER';
        document.getElementById('header-section').textContent =
            (s.name || 'Section ' + (idx+1)) + ' — ' + (idx+1) + ' of ' + currentSections.length;

        // Nav arrows
        document.getElementById('prev-btn').disabled = idx <= 0;
        document.getElementById('next-btn').disabled = idx >= currentSections.length - 1;

        // Video button
        const vidBtn = document.getElementById('vid-btn');
        if (s.youtube) {
            vidBtn.disabled = false;
            vidBtn.dataset.url = s.youtube;
        } else {
            vidBtn.disabled = true;
            vidBtn.dataset.url = '';
            hideVideo();
        }
    }

            // Convert YouTube watch URL to embed URL
            const videoId = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/)?.[1];
            if (videoId) {
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=0`;
                overlay.style.display = 'block';
                vidBtn.textContent = '✕ HIDE';
                vidBtn.classList.add('active');
            }
        } else {
            hideVideo();
        }
    }

    function hideVideo() {
        document.getElementById('yt-overlay').style.display = 'none';
        document.getElementById('yt-iframe').src = '';
        videoVisible = false;
        const vidBtn = document.getElementById('vid-btn');
        vidBtn.textContent = '📺 VIDEO';
        vidBtn.classList.remove('active');
    }

    // ─────────────────────────────────────────────
    //  SONG PICKER OVERLAY
    // ─────────────────────────────────────────────
    function buildPicker() {
        const list = document.getElementById('picker-list');
        const builtIn = [
            { name:'Smoke on the Water', artist:'Deep Purple',   key:'smoke'       },
            { name:'Seven Nation Army',  artist:'White Stripes', key:'sevenNation' },
            { name:'House of the Rising Sun', artist:'Animals',  key:'risingSum'   },
            { name:'Wonderwall',         artist:'Oasis',         key:'wonderwall'  },
            { name:'Iron Man',           artist:'Black Sabbath', key:'ironMan'     },
            { name:'Come As You Are',    artist:'Nirvana',       key:'comeAsYouAre'},
            { name:'Pentatonic Scale',   artist:'Beginner',      key:'pentatonic'  },
            { name:'Chromatic Scale',    artist:'Beginner',      key:'chromatic'   },
        ];

        list.innerHTML = builtIn.map(s => `
            <div class="picker-song" onclick="pickBuiltIn('${s.key}')">
                🎸 ${s.name}
                <div class="artist">${s.artist}</div>
            </div>
        `).join('');

        document.getElementById('close-picker').style.display = 'block';
    }

    function pickBuiltIn(key) {
        const song = SONGS[key];
        if (!song) return;
        bpm = song.bpm;
        activeTiming = [];
        tabEditor.value = song.tab;
        parseAndRender(song.tab);
        buildPills();
        renderCanvas(0);
        document.getElementById('header-song').textContent = key;
        document.getElementById('header-section').textContent = 'Section 1 of 1';
        document.getElementById('prev-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('vid-btn').disabled = true;
        closePicker();
        console.log('Loaded:', key, 'columns:', columns.length, 'pills:', pills.length);
    }
    window.pickBuiltIn = pickBuiltIn;

    function closePicker() {
        document.getElementById('picker-overlay').style.display = 'none';
    }
    window.closePicker = closePicker;

    // Tap header to open picker
    document.getElementById('header-bar').addEventListener('click', () => {
        const overlay = document.getElementById('picker-overlay');
        overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none';
    });

    // ─────────────────────────────────────────────
    //  GITHUB SONG LOADER
    // ─────────────────────────────────────────────
    const GITHUB_BASE = 'https://raw.githubusercontent.com/onlyGod-can-Intimidate-me/YiannisLick/main/songs/';

    async function loadGithubSongs() {
        try {
            const res = await fetch(GITHUB_BASE + 'index.json?t=' + Date.now());
            if (!res.ok) return;
            const index = await res.json();
            if (!index.songs?.length) return;

            const list = document.getElementById('picker-list');
            const githubHTML = index.songs.map(s => `
                <div class="picker-song" onclick="loadGithubSong('${s.file}')">
                    🎸 ${s.name}
                    <div class="artist">${s.artist || ''} · ${s.sections || '?'} sections</div>
                </div>
            `).join('');
            list.innerHTML += '<div style="font-size:11px;color:#4CAF50;padding:8px 0;letter-spacing:2px;">DAD\'S SONGS</div>' + githubHTML;
        } catch(e) { /* no songs on GitHub yet */ }
    }

    async function loadGithubSong(file) {
        try {
            const res  = await fetch(GITHUB_BASE + file + '?t=' + Date.now());
            const song = await res.json();
            loadSong(song);
        } catch(e) { alert('Could not load: ' + e.message); }
    }
    window.loadGithubSong = loadGithubSong;

    // Check URL params for direct song link
    async function checkUrlParams() {
        const params   = new URLSearchParams(window.location.search);
        const songFile = params.get('song');
        if (songFile) {
            try {
                const res  = await fetch(GITHUB_BASE + songFile + '?t=' + Date.now());
                const song = await res.json();
                loadSong(song);
                closePicker();
            } catch(e) { console.log('Could not auto-load:', e.message); }
        }
    }

    // ─────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────
    initCanvas();
    updateDisplay();
    buildPicker();        // populate song list immediately
    loadGithubSongs();    // then try to add GitHub songs
    checkUrlParams();     // check for ?song= param

    // Try to lock landscape on Android Chrome
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
    }

    </script>
</body>
</html>
