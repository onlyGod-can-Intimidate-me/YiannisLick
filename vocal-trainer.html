<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎤 Vocal Trainer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            padding: 10px;
            overflow-x: hidden;
            transition: background-color 0.15s ease;
        }

        h2 { text-align: center; font-size: 22px; margin-bottom: 12px; letter-spacing: 2px; }

        /* ── SETUP PANEL ── */
        #setup-panel {
            background: #111;
            border: 2px solid #E91E63;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }

        #setup-panel h3 { color: #E91E63; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }

        .setup-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .setup-row.single { grid-template-columns: 1fr; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #E91E63;
        }

        /* ── DROP ZONE ── */
        #drop-zone {
            border: 2px dashed #E91E63;
            border-radius: 10px;
            padding: 28px;
            text-align: center;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
            background: #0f0f0f;
        }
        #drop-zone:hover, #drop-zone.drag-over { background: #1a0a10; }
        #drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
        #drop-zone .label { color: #888; font-size: 14px; }
        #drop-zone .filename { color: #E91E63; font-size: 13px; margin-top: 6px; }

        /* ── BUTTONS ── */
        button {
            padding: 14px 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #E91E63;
            color: white;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            width: 100%;
            letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); opacity: 0.85; }
        button:disabled { background: #333; opacity: 0.5; color: #666; }
        button.secondary { background: #333; }
        button.green { background: #4CAF50; }
        button.cyan { background: #00BCD4; }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .btn-row.single { grid-template-columns: 1fr; }

        /* ── CANVAS ── */
        #canvas-wrap {
            position: relative;
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            background: #080808;
            margin-bottom: 12px;
        }
        #vocal-canvas { display: block; width: 100%; height: 260px; }

        /* ── LYRICS ── */
        #lyrics-display {
            background: #111;
            border: 2px solid #222;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            min-height: 70px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #lyric-line {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 6px;
            min-height: 28px;
        }
        #note-line {
            font-size: 13px;
            color: #E91E63;
            letter-spacing: 4px;
            min-height: 18px;
        }

        /* ── STATUS ── */
        #status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat-box {
            background: #111;
            border: 2px solid #222;
            border-radius: 8px;
            padding: 10px 6px;
            text-align: center;
            font-size: 12px;
        }
        .stat-box .val { font-size: 16px; font-weight: bold; color: #E91E63; }
        #mic-stat { border-color: #c62828; }
        #mic-stat.on { border-color: #2e7d32; }

        /* ── PROGRESS ── */
        #progress-wrap {
            background: #111;
            border: 2px solid #222;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            display: none;
        }
        #progress-label { font-size: 13px; color: #888; margin-bottom: 8px; }
        #progress-bar-bg {
            background: #222;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #E91E63, #FF5722);
            border-radius: 10px;
            width: 0%;
            transition: width 0.2s;
        }

        /* ── CONTROLS ── */
        #controls {
            background: #111;
            border: 2px solid #222;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        #controls label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #E91E63; margin-bottom: 10px; }

        .speed-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .speed-btns button { font-size: 12px; padding: 10px 4px; background: #222; }
        .speed-btns button.active { background: #E91E63; }
    </style>
</head>
<body>

<h2>🎤 VOCAL TRAINER</h2>

<!-- API Setup -->
<div id="setup-panel">
    <h3>⚙ HUGGING FACE API KEY</h3>
    <div class="setup-row single">
        <input type="password" id="hf-token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="setup-row single">
        <button id="save-token-btn" onclick="saveToken()">💾 SAVE KEY</button>
    </div>
    <div id="token-status" style="font-size:12px; color:#888; margin-top:6px; text-align:center;"></div>
</div>

<!-- Drop Zone -->
<div id="drop-zone" onclick="document.getElementById('audio-input').click()">
    <div class="icon">🎵</div>
    <div class="label">Drop acapella mp3 / wav here<br>or tap to browse</div>
    <div class="filename" id="file-name"></div>
    <input type="file" id="audio-input" accept="audio/*" style="display:none">
</div>

<!-- Analyse Button -->
<div class="btn-row single" style="margin-bottom:10px;">
    <button id="analyse-btn" disabled onclick="analyseAudio()">🔍 ANALYSE VOCALS</button>
</div>

<!-- Progress -->
<div id="progress-wrap">
    <div id="progress-label">Analysing...</div>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
    <canvas id="vocal-canvas"></canvas>
</div>

<!-- Lyrics -->
<div id="lyrics-display">
    <div id="lyric-line">— load a song to begin —</div>
    <div id="note-line"></div>
</div>

<!-- Playback Controls -->
<div class="btn-row">
    <button id="play-btn" class="green" disabled onclick="play()">▶ PLAY</button>
    <button id="stop-btn" class="secondary" disabled onclick="stop()">⏹ STOP</button>
</div>
<div class="btn-row">
    <button id="mic-btn" class="cyan" onclick="initMic()">🎤 MIC</button>
    <button id="loop-btn" class="secondary" onclick="toggleLoop()">🔁 LOOP</button>
</div>

<!-- Status -->
<div id="status-bar">
    <div class="stat-box" id="mic-stat">
        <div class="val" id="mic-val">OFF</div>
        <div>MIC</div>
    </div>
    <div class="stat-box">
        <div class="val" id="detected-val">—</div>
        <div>DETECTED</div>
    </div>
    <div class="stat-box">
        <div class="val" id="expected-val">—</div>
        <div>EXPECTED</div>
    </div>
</div>

<!-- Controls -->
<div id="controls">
    <label>🎤 Mic Boost: <span id="boost-val">3x</span></label>
    <input type="range" id="mic-boost" min="1" max="8" step="0.5" value="3"
        oninput="document.getElementById('boost-val').textContent=this.value+'x';
                 if(window._gainNode) window._gainNode.gain.value=parseFloat(this.value);">
    <div class="speed-btns">
        <button onclick="setSpeed(0.5, this)">🐢 SLOW</button>
        <button onclick="setSpeed(0.75, this)">🚶 MED</button>
        <button class="active" onclick="setSpeed(1.0, this)">🏃 FAST</button>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const NOTE_FREQS = {
    'C2':65.41,'C#2':69.30,'D2':73.42,'D#2':77.78,'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,'A#2':116.54,'B2':123.47,
    'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
    'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
    'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,
    'C6':1046.50
};

// Vocal range lanes — low to high, 8 lanes
const VOCAL_LANES = ['C3','E3','G3','B3','D4','F4','A4','C5'];
const LANE_COLORS = ['#E91E63','#FF5722','#FF9800','#FFC107','#8BC34A','#00BCD4','#2196F3','#9C27B0'];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let audioBuffer    = null;
let audioFile      = null;
let noteEvents     = [];   // [{timeMs, note, lyric, durMs}]
let pills          = [];
let isPlaying      = false;
let isLooping      = false;
let startTime      = null;
let rafId          = null;
let speedMult      = 1.0;
let audioCtx       = null;
let analyser       = null;
let scriptProc     = null;
let micStream      = null;
let sourceNode     = null;
let currentExpected = null;
let wrongFrames    = 0;
const WRONG_THRESH = 4;

let canvas, ctx;

// ─────────────────────────────────────────────
//  TOKEN
// ─────────────────────────────────────────────
function saveToken() {
    const val = document.getElementById('hf-token').value.trim();
    if (!val.startsWith('hf_')) {
        document.getElementById('token-status').textContent = '❌ Token should start with hf_';
        document.getElementById('token-status').style.color = '#f44336';
        return;
    }
    localStorage.setItem('hf_token', val);
    document.getElementById('token-status').textContent = '✅ Token saved!';
    document.getElementById('token-status').style.color = '#4CAF50';
}

window.addEventListener('load', () => {
    const saved = localStorage.getItem('hf_token');
    if (saved) {
        document.getElementById('hf-token').value = saved;
        document.getElementById('token-status').textContent = '✅ Token loaded';
        document.getElementById('token-status').style.color = '#4CAF50';
    }
    initCanvas();
});

// ─────────────────────────────────────────────
//  FILE HANDLING
// ─────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const audioInput = document.getElementById('audio-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadAudioFile(file);
});
audioInput.addEventListener('change', e => {
    if (e.target.files[0]) loadAudioFile(e.target.files[0]);
});

function loadAudioFile(file) {
    audioFile = file;
    document.getElementById('file-name').textContent = '🎵 ' + file.name;
    document.getElementById('analyse-btn').disabled = false;
    ensureAudioCtx();

    const reader = new FileReader();
    reader.onload = e => {
        audioCtx.decodeAudioData(e.target.result.slice(0), buf => {
            audioBuffer = buf;
        });
    };
    reader.readAsArrayBuffer(file);
}

// ─────────────────────────────────────────────
//  AUDIO CONTEXT
// ─────────────────────────────────────────────
function ensureAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

// ─────────────────────────────────────────────
//  ANALYSE — Hugging Face Whisper + local pitch
// ─────────────────────────────────────────────
async function analyseAudio() {
    const token = localStorage.getItem('hf_token') || document.getElementById('hf-token').value.trim();
    if (!token) { alert('Please enter your Hugging Face API key first!'); return; }
    if (!audioFile) { alert('Please load an audio file first!'); return; }

    const btn = document.getElementById('analyse-btn');
    btn.disabled = true;
    btn.textContent = '⏳ ANALYSING...';

    showProgress('Step 1/2 — Transcribing lyrics...', 10);

    try {
        // Step 1 — Whisper transcription with timestamps
        const formData = new FormData();
        formData.append('file', audioFile);

        const whisperRes = await fetch(
            'https://api-inference.huggingface.co/models/openai/whisper-large-v3',
            {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': audioFile.type || 'audio/mpeg',
                    'X-Wait-For-Model': 'true',
                },
                body: audioFile
            }
        );

        if (!whisperRes.ok) {
            const err = await whisperRes.text();
            throw new Error('Whisper error: ' + err);
        }

        const whisperData = await whisperRes.json();
        showProgress('Step 2/2 — Detecting pitch...', 55);

        // Step 2 — Local pitch detection on audio buffer
        const pitchMap = await detectPitchFromBuffer(audioBuffer, whisperData);
        showProgress('Building note map...', 85);

        // Step 3 — Build note events from whisper chunks + pitch
        noteEvents = buildNoteEvents(whisperData, pitchMap);
        showProgress('Done!', 100);

        setTimeout(() => {
            hideProgress();
            buildPills();
            renderCanvas(0);
            document.getElementById('play-btn').disabled = false;
            document.getElementById('lyric-line').textContent = '▶ Ready — hit PLAY!';
            document.getElementById('note-line').textContent = noteEvents.length + ' notes detected';
            btn.textContent = '✅ ANALYSED';
        }, 600);

    } catch(err) {
        hideProgress();
        btn.disabled = false;
        btn.textContent = '🔍 ANALYSE VOCALS';
        alert('Analysis failed: ' + err.message + '\n\nMake sure your API key is correct and the model is loaded.');
        console.error(err);
    }
}

// ─────────────────────────────────────────────
//  PITCH DETECTION ON FULL BUFFER
// ─────────────────────────────────────────────
async function detectPitchFromBuffer(buffer, whisperData) {
    const sampleRate = buffer.sampleRate;
    const data = buffer.getChannelData(0);
    const chunkSize = 2048;
    const hopSize = 1024; // overlap for better resolution
    const pitchMap = []; // [{timeMs, note}]

    const totalChunks = Math.floor((data.length - chunkSize) / hopSize);
    for (let i = 0; i < totalChunks; i++) {
        const chunk = data.slice(i * hopSize, i * hopSize + chunkSize);
        const freq = autoCorrelate(chunk, sampleRate);
        const note = getClosestNote(freq);
        const timeMs = (i * hopSize / sampleRate) * 1000;
        if (note) pitchMap.push({ timeMs, note });
    }
    return pitchMap;
}

function autoCorrelate(buffer, sampleRate) {
    const SIZE = buffer.length;
    const MAX_SAMPLES = Math.floor(SIZE / 2);
    let rms = 0;
    for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.008) return -1;

    let best_offset = -1, best_correlation = 0, lastCorrelation = 1;
    for (let offset = 1; offset < MAX_SAMPLES; offset++) {
        let correlation = 0;
        for (let i = 0; i < MAX_SAMPLES; i++) correlation += Math.abs(buffer[i] - buffer[i + offset]);
        correlation = 1 - correlation / MAX_SAMPLES;
        if (correlation > 0.8 && correlation > lastCorrelation && correlation > best_correlation) {
            best_correlation = correlation;
            best_offset = offset;
        }
        lastCorrelation = correlation;
    }
    return best_correlation > 0.01 ? sampleRate / best_offset : -1;
}

function getClosestNote(freq) {
    if (freq < 60 || freq > 1200) return null;
    let closest = null, minDiff = Infinity;
    for (const [note, noteFreq] of Object.entries(NOTE_FREQS)) {
        const diff = Math.abs(freq - noteFreq);
        if (diff < minDiff) { minDiff = diff; closest = note; }
    }
    return minDiff < NOTE_FREQS[closest] * 0.07 ? closest : null;
}

// ─────────────────────────────────────────────
//  BUILD NOTE EVENTS from Whisper + PitchMap
// ─────────────────────────────────────────────
function buildNoteEvents(whisperData, pitchMap) {
    const events = [];

    // Whisper returns chunks with timestamps
    const chunks = whisperData.chunks || [];

    chunks.forEach((chunk, i) => {
        const startMs  = (chunk.timestamp?.[0] ?? 0) * 1000;
        const endMs    = (chunk.timestamp?.[1] ?? startMs + 500) * 1000;
        const durMs    = Math.max(endMs - startMs, 200);
        const lyric    = chunk.text?.trim() ?? '';

        // Find dominant note in this time window from pitchMap
        const windowNotes = pitchMap.filter(p => p.timeMs >= startMs && p.timeMs < endMs);
        const note = dominantNote(windowNotes);

        if (lyric) {
            events.push({ timeMs: startMs, durMs, lyric, note });
        }
    });

    return events;
}

function dominantNote(notes) {
    if (!notes.length) return null;
    const counts = {};
    notes.forEach(n => { counts[n.note] = (counts[n.note] || 0) + 1; });
    return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] ?? null;
}

// ─────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────
function initCanvas() {
    canvas = document.getElementById('vocal-canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); if (!isPlaying) renderCanvas(0); });
}

function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  || 600;
    canvas.height = canvas.offsetHeight || 260;
}

// ─────────────────────────────────────────────
//  PILLS
// ─────────────────────────────────────────────
function buildPills() {
    pills = noteEvents.map(ev => ({
        ...ev,
        state: 'upcoming',
        triggered: false,
        lane: noteToLane(ev.note),
    }));
}

function noteToLane(note) {
    if (!note) return 3; // middle
    // Find closest vocal lane
    const noteFreq = NOTE_FREQS[note];
    if (!noteFreq) return 3;
    let closest = 0, minDiff = Infinity;
    VOCAL_LANES.forEach((ln, i) => {
        const diff = Math.abs(NOTE_FREQS[ln] - noteFreq);
        if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    return closest;
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function drawPillShape(x, y, w, h, r) {
    r = Math.min(r, h/2, w/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
}

function renderCanvas(elapsed) {
    elapsed = elapsed ?? 0;
    const W = canvas.width, H = canvas.height;
    const laneH = H / VOCAL_LANES.length;
    const hitX  = W * 0.22;
    const ppm   = (W - hitX) / 4000; // 4 seconds visible ahead

    ctx.clearRect(0, 0, W, H);

    // Lanes
    for (let i = 0; i < VOCAL_LANES.length; i++) {
        const y = i * laneH;
        ctx.fillStyle = i % 2 === 0 ? '#0d0d0d' : '#0f0f0f';
        ctx.fillRect(0, y, W, laneH);

        // Lane label
        ctx.fillStyle = '#2a2a2a';
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(VOCAL_LANES[i], 6, y + laneH/2);

        // Divider
        ctx.strokeStyle = '#181818';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, (i+1) * laneH);
        ctx.lineTo(W, (i+1) * laneH);
        ctx.stroke();
    }

    // Pills
    pills.forEach(p => {
        const timeUntil = p.timeMs - elapsed;
        const x   = hitX + timeUntil * ppm;
        const pw  = Math.max(p.durMs * ppm - 4, 36);
        const lY  = p.lane * laneH;
        const ph  = laneH * 0.72;
        const py  = lY + (laneH - ph) / 2;

        if (x > W + pw || x + pw < -40) return;

        let color = p.note ? LANE_COLORS[p.lane] : '#333';
        if (p.state === 'hit')    color = '#ffffff';
        if (p.state === 'missed') color = '#1e1e1e';

        // Glow on approach
        if (p.state === 'upcoming' && timeUntil >= 0 && timeUntil < 400) {
            ctx.shadowColor = color;
            ctx.shadowBlur  = 14;
        }

        ctx.fillStyle = color;
        drawPillShape(ctx, x, py, pw, ph, ph/2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Lyric text
        const fontSize = Math.min(ph * 0.45, 14);
        ctx.font = `bold ${fontSize}px Courier New`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = p.state === 'missed' ? '#333' : (p.state === 'hit' ? '#000' : '#000');
        // Clip text to pill width
        const maxW = pw - 8;
        let lyric = p.lyric;
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, py, pw, ph);
        ctx.clip();
        ctx.fillText(lyric, x + pw/2, py + ph/2);
        ctx.restore();
    });

    // Hit line
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(hitX, 0);
    ctx.lineTo(hitX, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Hit dots
    for (let i = 0; i < VOCAL_LANES.length; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(hitX, i * laneH + laneH/2, 4, 0, Math.PI*2);
        ctx.fill();
    }
}

// ─────────────────────────────────────────────
//  RAF LOOP
// ─────────────────────────────────────────────
function rafLoop() {
    if (!isPlaying) return;
    const elapsed = (performance.now() - startTime) * speedMult;

    // Update pill states
    pills.forEach(p => {
        if (!p.triggered && elapsed >= p.timeMs) {
            p.triggered = true;
            // Show lyric
            document.getElementById('lyric-line').textContent = p.lyric;
            document.getElementById('note-line').textContent  = p.note || '';
            if (micStream) currentExpected = p.note;
            // Auto-miss after duration
            setTimeout(() => {
                if (p.state === 'upcoming') p.state = 'missed';
                if (currentExpected === p.note) currentExpected = null;
            }, p.durMs / speedMult);
        }
    });

    // Check end
    const lastEvent = noteEvents[noteEvents.length - 1];
    if (lastEvent && elapsed > lastEvent.timeMs + lastEvent.durMs + 500) {
        if (isLooping) {
            startTime = performance.now();
            buildPills();
            renderCanvas(0);
            rafId = requestAnimationFrame(rafLoop);
            return;
        } else {
            stop();
            return;
        }
    }

    renderCanvas(elapsed);
    rafId = requestAnimationFrame(rafLoop);
}

// ─────────────────────────────────────────────
//  PLAY / STOP
// ─────────────────────────────────────────────
function play() {
    if (!noteEvents.length) return;
    ensureAudioCtx();

    // Play audio file
    if (audioBuffer) {
        if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.playbackRate.value = speedMult;
        sourceNode.connect(audioCtx.destination);
        sourceNode.start(0);
    }

    isPlaying = true;
    buildPills();
    startTime = performance.now();
    document.getElementById('play-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('lyric-line').textContent = '🎤';
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(rafLoop);
}

function stop() {
    isPlaying = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode = null; }
    document.getElementById('play-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;
    document.getElementById('lyric-line').textContent = '— stopped —';
    document.getElementById('note-line').textContent = '';
    document.getElementById('expected-val').textContent = '—';
    currentExpected = null;
    wrongFrames = 0;
    document.body.style.backgroundColor = '#0a0a0a';
    buildPills();
    renderCanvas(0);
}

function toggleLoop() {
    isLooping = !isLooping;
    const btn = document.getElementById('loop-btn');
    btn.textContent = isLooping ? '🔁 ON' : '🔁 LOOP';
    btn.style.background = isLooping ? '#FF9800' : '#333';
}

function setSpeed(mult, btn) {
    speedMult = mult;
    document.querySelectorAll('.speed-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (sourceNode) sourceNode.playbackRate.value = mult;
}

// ─────────────────────────────────────────────
//  MICROPHONE
// ─────────────────────────────────────────────
async function initMic() {
    try {
        ensureAudioCtx();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mic = audioCtx.createMediaStreamSource(micStream);
        scriptProc = audioCtx.createScriptProcessor(2048, 1, 1);
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = parseFloat(document.getElementById('mic-boost').value) || 3.0;
        window._gainNode = gainNode;
        mic.connect(gainNode);
        gainNode.connect(analyser);
        analyser.connect(scriptProc);
        scriptProc.connect(audioCtx.destination);
        scriptProc.onaudioprocess = processMicAudio;
        document.getElementById('mic-val').textContent = 'ON';
        document.getElementById('mic-stat').classList.add('on');
        document.getElementById('mic-btn').disabled = true;
    } catch(err) {
        alert('Mic error: ' + err.message);
    }
}

function processMicAudio() {
    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);

    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / buffer.length);

    if (rms > 0.01) {
        const freq     = autoCorrelate(buffer, audioCtx.sampleRate);
        const detected = getClosestNote(freq);
        document.getElementById('detected-val').textContent = detected ?? '~';
        document.getElementById('expected-val').textContent = currentExpected ?? '—';

        if (detected && currentExpected) {
            // Strip octave for comparison — C4 == C5 acceptable for singing
            const detectedBase  = detected.replace(/\d/, '');
            const expectedBase  = currentExpected.replace(/\d/, '');
            const correct = detectedBase === expectedBase;

            if (correct) {
                wrongFrames = 0;
                document.body.style.backgroundColor = '#0a0a0a';
                // Mark current pill hit
                pills.forEach(p => {
                    if (p.triggered && p.state === 'upcoming' && p.note === currentExpected) {
                        p.state = 'hit';
                    }
                });
            } else {
                wrongFrames++;
                if (wrongFrames >= WRONG_THRESH) document.body.style.backgroundColor = '#1a0000';
            }
        } else {
            wrongFrames = 0;
            document.body.style.backgroundColor = '#0a0a0a';
        }
    } else {
        wrongFrames = 0;
        document.getElementById('detected-val').textContent = '—';
        document.body.style.backgroundColor = '#0a0a0a';
    }
}

// ─────────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────────
function showProgress(label, pct) {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-label').textContent  = label;
    document.getElementById('progress-bar').style.width    = pct + '%';
}
function hideProgress() {
    document.getElementById('progress-wrap').style.display = 'none';
}

</script>
