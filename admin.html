
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎸 Guitar Trainer — Admin</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            padding: 10px;
        }

        h1 { text-align:center; font-size:18px; letter-spacing:3px; color:#4CAF50; margin-bottom:12px; }

        /* ── PANELS ── */
        .panel {
            background: #111;
            border: 2px solid #222;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .panel h3 { font-size:12px; color:#4CAF50; letter-spacing:2px; margin-bottom:10px; }

        /* ── INPUTS ── */
        input[type="text"], input[type="number"], input[type="url"], textarea, select {
            width: 100%;
            padding: 11px;
            font-size: 13px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }
        input:focus, textarea:focus { outline:none; border-color:#4CAF50; }
        textarea { resize: vertical; min-height: 120px; }

        /* ── BUTTONS ── */
        button {
            padding: 13px 10px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: #000;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            width: 100%;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        button:active { transform: scale(0.96); }
        button.red    { background: #f44336; color:#fff; }
        button.orange { background: #FF9800; color:#000; }
        button.grey   { background: #333;    color:#fff; }
        button.blue   { background: #2196F3; color:#fff; }
        button:disabled { background:#222; color:#444; }

        .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .btn-row button { margin-bottom:0; }

        /* ── SECTION CARDS ── */
        .section-card {
            background: #0f0f0f;
            border: 2px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            position: relative;
        }
        .section-card h4 {
            font-size:12px; color:#888; letter-spacing:1px; margin-bottom:8px;
        }
        .section-card .delete-btn {
            position:absolute; top:10px; right:10px;
            background:#1a0000; color:#f44336; border:1px solid #f44336;
            width:auto; padding:4px 10px; font-size:11px; margin-bottom:0;
            border-radius:4px;
        }

        /* ── RECORD PAD ── */
        #record-pad {
            background: #000;
            border: 3px solid #f44336;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 8px;
            display: none;
        }
        #record-pad.active { border-color: #f44336; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        #tap-btn {
            background: #f44336;
            font-size: 22px;
            padding: 24px;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #tap-count { font-size:13px; color:#888; }
        #timing-preview {
            font-size:11px; color:#444; margin-top:8px;
            word-break: break-all;
        }

        /* ── SONG LIST ── */
        .song-item {
            background: #0f0f0f;
            border: 2px solid #222;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .song-item .name { font-size:13px; color:#4CAF50; }
        .song-item .meta { font-size:11px; color:#555; }
        .song-item .load-btn {
            background:#222; color:#fff; width:auto;
            padding:6px 12px; font-size:11px; margin-bottom:0;
        }

        /* ── TAB HELPER ── */
        .tab-template {
            font-family:'Courier New',monospace;
            font-size:12px;
            color:#555;
            background:#0a0a0a;
            padding:8px;
            border-radius:4px;
            margin-bottom:8px;
            white-space:pre;
        }

        label { font-size:11px; color:#666; display:block; margin-bottom:4px; }
    </style>
</head>
<body>

<h1>🎸 GUITAR TRAINER ADMIN</h1>

<!-- ── SONG META ── -->
<div class="panel">
    <h3>📝 SONG DETAILS</h3>
    <label>Song Name</label>
    <input type="text" id="song-name" placeholder="e.g. Smoke on the Water">
    <label>Artist</label>
    <input type="text" id="song-artist" placeholder="e.g. Deep Purple">
    <label>Default BPM</label>
    <input type="number" id="song-bpm" value="100" min="40" max="300">
</div>

<!-- ── SECTIONS ── -->
<div class="panel">
    <h3>🎵 SECTIONS</h3>
    <div id="sections-list"></div>
    <button class="orange" onclick="addSection()">+ ADD SECTION</button>
</div>

<!-- ── RECORD PAD (shown when recording) ── -->
<div id="record-pad">
    <div style="font-size:13px; color:#f44336; margin-bottom:12px; letter-spacing:2px;">⏺ RECORDING TIMING</div>
    <button id="tap-btn" onclick="tap()">TAP</button>
    <div id="tap-count">0 taps</div>
    <div id="timing-preview"></div>
    <div class="btn-row" style="margin-top:12px;">
        <button class="grey" onclick="clearTaps()">🗑 CLEAR</button>
        <button class="blue" onclick="saveTiming()">✅ SAVE TIMING</button>
    </div>
</div>

<!-- ── SAVE / LOAD ── -->
<div class="panel">
    <h3>💾 SAVE & LOAD</h3>
    <button onclick="saveSong()">⬇ DOWNLOAD SONG JSON</button>
    <div style="font-size:11px; color:#555; margin-bottom:8px; text-align:center;">
        Upload the JSON to your GitHub /songs/ folder
    </div>
    <label>Load existing song JSON to edit</label>
    <input type="file" id="load-json" accept=".json" onchange="loadSong(event)"
        style="padding:8px; font-size:12px; cursor:pointer;">
</div>

<!-- ── SAVED SONGS (from GitHub) ── -->
<div class="panel">
    <h3>📚 SONGS ON GITHUB</h3>
    <div style="font-size:11px; color:#555; margin-bottom:8px;">
        Paste your GitHub raw base URL below to load your song library
    </div>
    <input type="url" id="github-base" 
        placeholder="https://raw.githubusercontent.com/user/repo/main/songs/"
        value="https://raw.githubusercontent.com/onlyGod-can-Intimidate-me/guitar-trainer/main/songs/">
    <button class="grey" onclick="loadLibrary()">📂 LOAD LIBRARY</button>
    <div id="library-list"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let sections = [];
let activeRecordingSection = null;
let taps = [];
let recordStart = null;

// ─────────────────────────────────────────────
//  ADD SECTION
// ─────────────────────────────────────────────
function addSection() {
    const id = Date.now();
    sections.push({
        id,
        name:    'Section ' + (sections.length + 1),
        bpm:     parseInt(document.getElementById('song-bpm').value) || 100,
        tab:     defaultTab(),
        youtube: '',
        timing:  [],
    });
    renderSections();
}

function defaultTab() {
    return `e|-------------------------------|
B|-------------------------------|
G|-------------------------------|
D|-------------------------------|
A|-------------------------------|
E|-------------------------------|`;
}

function renderSections() {
    const list = document.getElementById('sections-list');
    if (!sections.length) {
        list.innerHTML = '<div style="font-size:12px;color:#444;text-align:center;padding:10px;">No sections yet — hit ADD SECTION</div>';
        return;
    }
    list.innerHTML = sections.map((s, i) => `
        <div class="section-card" id="card-${s.id}">
            <button class="delete-btn" onclick="deleteSection(${s.id})">✕</button>
            <h4>SECTION ${i+1}</h4>

            <label>Section Name</label>
            <input type="text" value="${s.name}" 
                onchange="updateSection(${s.id}, 'name', this.value)"
                placeholder="e.g. Main Riff, Verse, Chorus">

            <label>BPM for this section</label>
            <input type="number" value="${s.bpm}" min="40" max="300"
                onchange="updateSection(${s.id}, 'bpm', parseInt(this.value))">

            <label>Tab (fill in fret numbers after recording timing)</label>
            <textarea onchange="updateSection(${s.id}, 'tab', this.value)">${s.tab}</textarea>

            <label>YouTube Tutorial URL (optional)</label>
            <input type="url" value="${s.youtube}"
                onchange="updateSection(${s.id}, 'youtube', this.value)"
                placeholder="https://youtube.com/watch?v=...">

            <div style="font-size:11px; color:${s.timing.length ? '#4CAF50' : '#555'}; margin-bottom:8px;">
                ${s.timing.length ? '✅ ' + s.timing.length + ' timing points recorded' : '⚠ No timing recorded yet'}
            </div>

            <div class="btn-row">
                <button class="red" onclick="startRecording(${s.id})">⏺ RECORD TIMING</button>
                <button class="grey" onclick="previewSection(${s.id})">▶ PREVIEW</button>
            </div>
        </div>
    `).join('');
}

function updateSection(id, key, val) {
    const s = sections.find(s => s.id === id);
    if (s) s[key] = val;
}

function deleteSection(id) {
    if (!confirm('Delete this section?')) return;
    sections = sections.filter(s => s.id !== id);
    renderSections();
}

// ─────────────────────────────────────────────
//  RECORD TIMING
// ─────────────────────────────────────────────
function startRecording(sectionId) {
    activeRecordingSection = sectionId;
    taps = [];
    recordStart = null;
    document.getElementById('record-pad').style.display = 'block';
    document.getElementById('tap-count').textContent = '0 taps — tap in rhythm with your playing';
    document.getElementById('timing-preview').textContent = '';
    document.getElementById('record-pad').scrollIntoView({ behavior: 'smooth' });
}

function tap() {
    const now = performance.now();
    if (!recordStart) recordStart = now;
    const elapsed = Math.round(now - recordStart);
    taps.push(elapsed);

    document.getElementById('tap-count').textContent = taps.length + ' taps';
    document.getElementById('timing-preview').textContent = taps.join(', ') + ' ms';

    // Flash the button
    const btn = document.getElementById('tap-btn');
    btn.style.background = '#fff';
    setTimeout(() => btn.style.background = '#f44336', 80);
}

function clearTaps() {
    taps = [];
    recordStart = null;
    document.getElementById('tap-count').textContent = '0 taps';
    document.getElementById('timing-preview').textContent = '';
}

function saveTiming() {
    if (!taps.length) { alert('No taps recorded!'); return; }
    const s = sections.find(s => s.id === activeRecordingSection);
    if (s) {
        s.timing = [...taps];
        renderSections();
        document.getElementById('record-pad').style.display = 'none';
        alert('✅ Timing saved! ' + taps.length + ' points. Now fill in the fret numbers in the tab.');
    }
}

// ─────────────────────────────────────────────
//  PREVIEW — opens guitar trainer with this section
// ─────────────────────────────────────────────
function previewSection(id) {
    const s = sections.find(s => s.id === id);
    if (!s) return;
    // Encode section as URL params and open guitar trainer
    const params = new URLSearchParams({
        preview: '1',
        tab: s.tab,
        bpm: s.bpm
    });
    window.open('index.html?' + params.toString(), '_blank');
}

// ─────────────────────────────────────────────
//  SAVE SONG AS JSON
// ─────────────────────────────────────────────
function saveSong() {
    const name   = document.getElementById('song-name').value.trim();
    const artist = document.getElementById('song-artist').value.trim();
    const bpm    = parseInt(document.getElementById('song-bpm').value) || 100;

    if (!name) { alert('Please enter a song name first!'); return; }
    if (!sections.length) { alert('Please add at least one section!'); return; }

    const song = { name, artist, bpm, sections };
    const json = JSON.stringify(song, null, 2);
    const blob = new Blob([json], { type: 'application/json' });

    // Filename: kebab-case of song name
    const filename = name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.json';

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();

    alert(`✅ Saved as "${filename}"\n\nNow upload it to your GitHub /songs/ folder!`);
}

// ─────────────────────────────────────────────
//  LOAD SONG JSON FOR EDITING
// ─────────────────────────────────────────────
function loadSong(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const song = JSON.parse(e.target.result);
            document.getElementById('song-name').value   = song.name   || '';
            document.getElementById('song-artist').value = song.artist || '';
            document.getElementById('song-bpm').value    = song.bpm    || 100;
            sections = song.sections.map(s => ({ ...s, id: s.id || Date.now() + Math.random() }));
            renderSections();
            alert('✅ Song loaded — ' + sections.length + ' sections');
        } catch(err) {
            alert('❌ Could not parse JSON: ' + err.message);
        }
    };
    reader.readAsText(file);
}

// ─────────────────────────────────────────────
//  LOAD LIBRARY FROM GITHUB
// ─────────────────────────────────────────────
async function loadLibrary() {
    const base = document.getElementById('github-base').value.trim();
    if (!base) { alert('Paste your GitHub raw base URL first!'); return; }

    const list = document.getElementById('library-list');
    list.innerHTML = '<div style="font-size:12px;color:#888;padding:8px;">⏳ Loading...</div>';

    try {
        // Fetch the index file
        const res  = await fetch(base + 'index.json?t=' + Date.now());
        if (!res.ok) throw new Error('Could not load index.json — have you created it yet?');
        const index = await res.json();

        if (!index.songs?.length) {
            list.innerHTML = '<div style="font-size:12px;color:#555;padding:8px;">No songs found in index.json</div>';
            return;
        }

        list.innerHTML = index.songs.map(s => `
            <div class="song-item">
                <div>
                    <div class="name">🎸 ${s.name}</div>
                    <div class="meta">${s.artist || ''} · ${s.sections || '?'} sections</div>
                </div>
                <button class="load-btn" onclick="loadFromGithub('${base}${s.file}')">EDIT</button>
            </div>
        `).join('');

    } catch(err) {
        list.innerHTML = `<div style="font-size:12px;color:#f44336;padding:8px;">❌ ${err.message}</div>`;
    }
}

async function loadFromGithub(url) {
    try {
        const res  = await fetch(url + '?t=' + Date.now());
        const song = await res.json();
        document.getElementById('song-name').value   = song.name   || '';
        document.getElementById('song-artist').value = song.artist || '';
        document.getElementById('song-bpm').value    = song.bpm    || 100;
        sections = song.sections.map(s => ({ ...s, id: s.id || Date.now() + Math.random() }));
        renderSections();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        alert('✅ Loaded: ' + song.name);
    } catch(err) {
        alert('❌ Could not load: ' + err.message);
    }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderSections();
</script>
</body>
</html>
